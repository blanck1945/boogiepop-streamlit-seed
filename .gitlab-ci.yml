variables:
  GIT_DEPTH: "0"
  AWS_DEFAULT_REGION: us-east-1
  ECR_REGISTRY: "653876198281.dkr.ecr.us-east-1.amazonaws.com"
  STREAMLIT_ECR_REPOSITORY: boogiepop-streamlit
  ECS_CLUSTER_NAME: boogiepop-api-cluster
  ECS_STREAMLIT_SERVICE_NAME: boogiepop-api-streamlit-svc

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "staging"'
    - when: never

stages:
  - guard
  - deploy

# Validación de manifest de infra: MR hacia líneas estable o push directo a develop/staging/main.
protect_seed_manifest:
  stage: guard
  image: python:3.12-slim-bookworm
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends git
    - rm -rf /var/lib/apt/lists/*

  rules:
    - if: "$CI_COMMIT_TAG"
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^(develop|staging|main)$/'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^(develop|staging)$/'
    - when: never

  script:
    - set -eu
    - |
      if [ -n "${CI_MERGE_REQUEST_IID:-}" ]; then
        BASE_SHA="${CI_MERGE_REQUEST_DIFF_BASE_SHA}"
      elif \
        [ -n "${CI_COMMIT_BEFORE_SHA:-}" ] && \
        [ "$CI_COMMIT_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]
      then
        BASE_SHA="${CI_COMMIT_BEFORE_SHA}"
      else
        REMOTE_BRANCH="${CI_DEFAULT_BRANCH:-develop}"
        git fetch origin "${REMOTE_BRANCH}" || git fetch origin "${REMOTE_BRANCH}:refs/remotes/origin/${REMOTE_BRANCH}"
        FETCH_REF="$(git rev-parse "origin/${REMOTE_BRANCH}")"
        BASE_SHA="$(git merge-base "${FETCH_REF}" "${CI_COMMIT_SHA}")"
      fi
    - >-
      python scripts/check_protected_paths.py
      --manifest maintainers/seed-protected-paths.txt
      --repository .
      --from-ref "${BASE_SHA}"
      --to-ref "${CI_COMMIT_SHA}"

# Workflow ramas vivas — sólo merge request pipelines dirigidos a develop/staging/main.
merge_request_branch_flow:
  stage: guard
  image: alpine:3.21
  rules:
    - if: "$CI_COMMIT_TAG"
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME =~ /^(develop|staging|main)$/'
    - when: never
  script:
    - chmod +x scripts/gitlab/validate_mr_branch_flow.sh
    - sh scripts/gitlab/validate_mr_branch_flow.sh

.docker_publish_streamlit:
  stage: deploy
  image: ubuntu:22.04
  services:
    - name: docker:24-dind
      command: ["--tls=false"]
  variables:
    IMAGE_TAG: $CI_COMMIT_SHORT_SHA
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    FF_NETWORK_PER_BUILD: "1"
  before_script:
    - apt-get update -qq
    - DEBIAN_FRONTEND=noninteractive apt-get install -y -qq curl ca-certificates unzip gnupg
    - |
      set -eu
      if [ -z "${ECR_REGISTRY:-}" ]; then
        echo "ERROR: definí ECR_REGISTRY en Settings → CI/CD → Variables"
        exit 1
      fi
      if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
        echo "ERROR: faltan AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY (Protected en main)."
        exit 1
      fi
    - install -dm755 /etc/apt/keyrings
    - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    - chmod a+r /etc/apt/keyrings/docker.gpg
    - echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu jammy stable" > /etc/apt/sources.list.d/docker.list
    - apt-get update -qq
    - DEBIAN_FRONTEND=noninteractive apt-get install -y -qq docker-ce-cli docker-buildx-plugin
    - curl -fsSL https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o /tmp/awscliv2.zip
    - unzip -q /tmp/awscliv2.zip -d /tmp
    - /tmp/aws/install -i /usr/local/aws-cli -b /usr/local/bin
    - aws sts get-caller-identity
    - sleep 3
    - docker info
    - docker buildx create --name ci-streamlit-build --use 2>/dev/null || docker buildx use ci-streamlit-build
    - docker run --privileged --rm tonistiigi/binfmt:latest --install all
    - bash -cx 'REG_HOST=$(echo "${ECR_REGISTRY}" | cut -d/ -f1); aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" | docker login --username AWS --password-stdin "${REG_HOST}"'
  script:
    - |
      set -eux
      BASE_URI="${ECR_REGISTRY}/${STREAMLIT_ECR_REPOSITORY}"
      IMAGE_URI="${BASE_URI}:${IMAGE_TAG}"
      COMMON="docker buildx build --platform linux/arm64 --provenance=false --sbom=false --push"
      if [ "${CI_COMMIT_BRANCH}" = "main" ]; then
        ${COMMON} -t "${IMAGE_URI}" -t "${BASE_URI}:latest" .
      elif [ -n "${CI_COMMIT_TAG:-}" ]; then
        ${COMMON} -t "${IMAGE_URI}" -t "${BASE_URI}:latest" .
      else
        ${COMMON} -t "${IMAGE_URI}" -t "${BASE_URI}:develop" .
      fi

docker-publish-streamlit:
  extends: .docker_publish_streamlit
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "push"'
      when: manual
    - when: never

docker-publish-streamlit-prod:
  extends: .docker_publish_streamlit
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never

deploy-streamlit-ecs:
  stage: deploy
  image:
    name: amazon/aws-cli:2.27.25
    entrypoint: [""]
  needs: ["docker-publish-streamlit"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "push"'
      when: manual
    - when: never
  before_script:
    - |
      set -eu
      if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
        echo "ERROR: faltan credenciales AWS en CI/CD Variables."
        exit 1
      fi
  script:
    - aws sts get-caller-identity
    - aws ecs update-service --cluster "$ECS_CLUSTER_NAME" --service "$ECS_STREAMLIT_SERVICE_NAME" --force-new-deployment --region "$AWS_DEFAULT_REGION"

deploy-streamlit-ecs-prod:
  stage: deploy
  image:
    name: amazon/aws-cli:2.27.25
    entrypoint: [""]
  needs: ["docker-publish-streamlit-prod"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      when: on_success
    - when: never
  before_script:
    - |
      set -eu
      if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
        echo "ERROR: faltan credenciales AWS en CI/CD Variables."
        exit 1
      fi
  script:
    - aws sts get-caller-identity
    - aws ecs update-service --cluster "$ECS_CLUSTER_NAME" --service "$ECS_STREAMLIT_SERVICE_NAME" --force-new-deployment --region "$AWS_DEFAULT_REGION"

